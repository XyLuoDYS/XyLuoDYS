name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"  # 每天自动跑一次
  workflow_dispatch:       # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: XyLuoDYS
          outputs: |
            # 亮色模式：使用绿色和黄色的半透明组合
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=rgba(57,181,74,0.7)&color_dots=rgba(235,237,240,0.5),rgba(172,230,174,0.5),rgba(123,201,111,0.5),rgba(35,154,59,0.5),rgba(25,104,43,0.5)

            # 深色模式：使用蓝色和紫色的半透明组合，并设置一个稍暗的背景色
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=rgba(110,118,129,0.7)&color_dots=rgba(22,27,34,0.5),rgba(1,116,190,0.5),rgba(10,165,255,0.5),rgba(110,190,255,0.5),rgba(168,225,255,0.5)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
